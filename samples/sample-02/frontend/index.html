<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sales Intelligence Platform</title>
  <style>
    :root {
      --bg: #0f1117; --surface: #1a1d27; --card: #1e2130; --border: #2a2d3e;
      --accent: #10b981; --accent-light: #34d399;
      --blue: #3b82f6; --yellow: #f59e0b; --red: #ef4444; --purple: #8b5cf6;
      --text: #e2e8f0; --text-muted: #64748b; --radius: 10px; --shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 32px; display: flex; align-items: center; gap: 12px; }
    header h1 { font-size: 1.2rem; font-weight: 700; color: var(--accent-light); }
    .badge { background: var(--accent); color: #000; font-size: 0.7rem; padding: 2px 8px; border-radius: 20px; font-weight: 700; }
    nav { display: flex; gap: 4px; margin-left: auto; }
    nav button { background: none; border: 1px solid var(--border); color: var(--text-muted); padding: 6px 16px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; transition: all 0.2s; }
    nav button.active, nav button:hover { background: var(--accent); color: #000; border-color: var(--accent); }
    main { max-width: 1200px; margin: 32px auto; padding: 0 24px; }
    .page { display: none; }
    .page.active { display: block; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 20px; box-shadow: var(--shadow); }
    .card h2 { font-size: 1rem; font-weight: 600; margin-bottom: 16px; color: var(--accent-light); }
    .form-group { margin-bottom: 14px; }
    label { display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.05em; }
    input, textarea { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 10px 14px; color: var(--text); font-size: 0.9rem; font-family: inherit; outline: none; transition: border-color 0.2s; }
    input:focus, textarea:focus { border-color: var(--accent); }
    .btn { padding: 10px 18px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.85rem; font-weight: 600; transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px; }
    .btn-primary { background: var(--accent); color: #000; }
    .btn-primary:hover { background: var(--accent-light); }
    .btn-blue { background: var(--blue); color: white; }
    .btn-blue:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid rgba(0,0,0,0.3); border-top-color: #000; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-msg { color: var(--red); font-size: 0.85rem; margin-top: 8px; }
    .success-msg { color: var(--accent); font-size: 0.85rem; margin-top: 8px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }

    /* Pipeline Kanban */
    .kanban { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
    .kanban-col { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px; min-height: 300px; }
    .kanban-col-header { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .stage-badge { background: var(--bg); border: 1px solid var(--border); border-radius: 20px; font-size: 0.7rem; padding: 1px 7px; color: var(--text-muted); }
    .deal-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px; margin-bottom: 8px; cursor: pointer; transition: border-color 0.2s; }
    .deal-card:hover { border-color: var(--accent); }
    .deal-card .company { font-weight: 600; font-size: 0.9rem; margin-bottom: 4px; }
    .deal-card .industry { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 6px; }
    .score-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }
    .score-high { background: var(--accent); }
    .score-mid { background: var(--yellow); }
    .score-low { background: var(--red); }

    /* Enrich form */
    .enrich-result { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-top: 16px; display: none; }
    .enrich-result.visible { display: block; }
    .tag-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
    .tag { background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 3px 8px; font-size: 0.75rem; color: var(--text-muted); }
    .tag.pain { border-color: var(--red); color: var(--red); }
    .tag.value { border-color: var(--accent); color: var(--accent); }
    .score-circle { width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: 800; border: 3px solid var(--accent); color: var(--accent); }

    /* Email display */
    .email-box { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-top: 16px; display: none; }
    .email-box.visible { display: block; }
    .email-subject { font-weight: 700; font-size: 1rem; color: var(--accent-light); margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
    .email-body { font-size: 0.9rem; line-height: 1.7; white-space: pre-wrap; }

    /* Log */
    .log-item { font-size: 0.8rem; padding: 6px 0; border-bottom: 1px solid var(--border); display: flex; gap: 12px; }
    .log-item .action { color: var(--accent); font-weight: 600; min-width: 120px; }
    .log-item .time { color: var(--text-muted); min-width: 80px; font-size: 0.75rem; }
  </style>
</head>
<body>
<header>
  <span style="font-size:1.5rem;">📈</span>
  <h1>Sales Intelligence Platform</h1>
  <span class="badge">HO16 Sample 02</span>
  <nav>
    <button class="active" onclick="showPage('pipeline', this)">Pipeline</button>
    <button onclick="showPage('enrich', this)">Enrich Lead</button>
  </nav>
</header>

<main>
  <!-- PIPELINE -->
  <div class="page active" id="page-pipeline">
    <div class="card" style="margin-bottom:16px;">
      <h2>📊 Deal Pipeline</h2>
      <div class="kanban" id="kanban-board">
        <p style="color:var(--text-muted);font-size:0.85rem;">Loading pipeline...</p>
      </div>
    </div>
  </div>

  <!-- ENRICH -->
  <div class="page" id="page-enrich">
    <div class="card">
      <h2>🔍 Lead Enrichment</h2>
      <p style="font-size:0.85rem;color:var(--text-muted);margin-bottom:16px;">Enter a company name and Claude will research it — industry, size, pain points, and value propositions.</p>
      <div class="grid-2">
        <div class="form-group">
          <label>Company Name *</label>
          <input type="text" id="enrich-company" placeholder="e.g. Acme Corp" />
        </div>
        <div class="form-group">
          <label>Contact Name (optional)</label>
          <input type="text" id="enrich-contact" placeholder="e.g. Jane Smith" />
        </div>
      </div>
      <div class="form-group">
        <label>Contact Email (optional)</label>
        <input type="email" id="enrich-email" placeholder="e.g. jane@acme.com" />
      </div>
      <button class="btn btn-primary" onclick="enrichLead()" id="enrich-btn">🔍 Enrich with Claude</button>
      <div id="enrich-msg"></div>

      <div class="enrich-result" id="enrich-result">
        <div style="display:flex;gap:20px;align-items:flex-start;margin-bottom:16px;">
          <div class="score-circle" id="result-score">—</div>
          <div style="flex:1;">
            <div style="font-weight:700;font-size:1.1rem;" id="result-company">—</div>
            <div style="color:var(--text-muted);font-size:0.85rem;margin-top:2px;" id="result-industry">—</div>
            <div style="color:var(--text-muted);font-size:0.85rem;" id="result-size">—</div>
          </div>
        </div>
        <p style="font-size:0.85rem;color:var(--text-muted);margin-bottom:12px;line-height:1.6;" id="result-notes"></p>
        <div style="margin-bottom:12px;">
          <label>Pain Points</label>
          <div class="tag-list" id="result-pain"></div>
        </div>
        <div style="margin-bottom:16px;">
          <label>Value Propositions</label>
          <div class="tag-list" id="result-value"></div>
        </div>
        <div style="display:flex;gap:10px;">
          <button class="btn btn-blue" onclick="draftEmail()" id="draft-btn">✉️ Draft Outreach Email</button>
          <select id="stage-select" style="background:var(--surface);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:6px;font-size:0.85rem;">
            <option value="prospect">Prospect</option>
            <option value="qualified">Qualified</option>
            <option value="proposal">Proposal</option>
            <option value="closed_won">Closed Won</option>
            <option value="closed_lost">Closed Lost</option>
          </select>
          <button class="btn btn-primary" onclick="changeStage()" style="font-size:0.8rem;">Update Stage</button>
        </div>

        <div class="email-box" id="email-box">
          <div class="email-subject" id="email-subject"></div>
          <div class="email-body" id="email-body"></div>
        </div>
      </div>
    </div>
  </div>
</main>

<script>
  const API = '';
  let currentLeadId = null;

  function showPage(name, btn) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById('page-' + name).classList.add('active');
    btn.classList.add('active');
    if (name === 'pipeline') loadPipeline();
  }

  const STAGE_LABELS = {
    prospect: 'Prospect', qualified: 'Qualified', proposal: 'Proposal',
    closed_won: 'Closed Won', closed_lost: 'Closed Lost'
  };
  const STAGE_COLORS = {
    prospect: '#64748b', qualified: '#3b82f6', proposal: '#f59e0b',
    closed_won: '#10b981', closed_lost: '#ef4444'
  };

  async function loadPipeline() {
    try {
      const r = await fetch(API + '/api/pipeline');
      const d = await r.json();
      const board = document.getElementById('kanban-board');
      const stages = ['prospect', 'qualified', 'proposal', 'closed_won', 'closed_lost'];

      board.innerHTML = stages.map(stage => `
        <div class="kanban-col">
          <div class="kanban-col-header" style="color:${STAGE_COLORS[stage]}">
            ${STAGE_LABELS[stage]}
            <span class="stage-badge">${(d.by_stage[stage] || []).length}</span>
          </div>
          <div>
            ${(d.by_stage[stage] || []).map(lead => `
              <div class="deal-card" onclick="viewLead(${lead.id})">
                <div class="company">${escHtml(lead.company)}</div>
                <div class="industry">${escHtml(lead.industry || 'Unknown Industry')}</div>
                <div style="font-size:0.75rem;">
                  <span class="score-dot ${lead.lead_score >= 7 ? 'score-high' : lead.lead_score >= 4 ? 'score-mid' : 'score-low'}"></span>
                  Score: ${lead.lead_score}/10
                </div>
              </div>
            `).join('') || '<p style="color:var(--text-muted);font-size:0.8rem;">No leads</p>'}
          </div>
        </div>
      `).join('');
    } catch (err) {
      console.error(err);
    }
  }

  async function viewLead(id) {
    const r = await fetch(API + '/api/leads/' + id);
    const lead = await r.json();
    // Switch to enrich page and show result
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById('page-enrich').classList.add('active');
    document.querySelectorAll('nav button')[1].classList.add('active');
    showEnrichResult(lead);
  }

  async function enrichLead() {
    const company = document.getElementById('enrich-company').value.trim();
    const contact = document.getElementById('enrich-contact').value.trim();
    const email = document.getElementById('enrich-email').value.trim();
    const msg = document.getElementById('enrich-msg');
    const btn = document.getElementById('enrich-btn');

    if (!company) { msg.innerHTML = '<p class="error-msg">Company name is required.</p>'; return; }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Enriching...';
    msg.innerHTML = '';

    try {
      const r = await fetch(API + '/api/leads/enrich', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ company, contact_name: contact, contact_email: email })
      });
      const lead = await r.json();
      if (!r.ok) throw new Error(lead.error);
      showEnrichResult(lead);
      msg.innerHTML = '<p class="success-msg">Lead enriched and saved to CRM!</p>';
    } catch (err) {
      msg.innerHTML = `<p class="error-msg">Error: ${err.message}</p>`;
    }

    btn.disabled = false;
    btn.innerHTML = '🔍 Enrich with Claude';
  }

  function showEnrichResult(lead) {
    currentLeadId = lead.id;
    document.getElementById('result-score').textContent = lead.lead_score + '/10';
    document.getElementById('result-company').textContent = lead.company;
    document.getElementById('result-industry').textContent = lead.industry;
    document.getElementById('result-size').textContent = lead.company_size;
    document.getElementById('result-notes').textContent = lead.enrichment_notes;
    document.getElementById('result-pain').innerHTML = (lead.pain_points || []).map(p => `<span class="tag pain">${escHtml(p)}</span>`).join('');
    document.getElementById('result-value').innerHTML = (lead.value_props || []).map(v => `<span class="tag value">${escHtml(v)}</span>`).join('');
    document.getElementById('stage-select').value = lead.stage;
    document.getElementById('enrich-result').classList.add('visible');
    document.getElementById('email-box').classList.remove('visible');
  }

  async function draftEmail() {
    if (!currentLeadId) return;
    const btn = document.getElementById('draft-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Writing...';
    try {
      const r = await fetch(API + '/api/leads/' + currentLeadId + '/email', { method: 'POST' });
      const d = await r.json();
      if (!r.ok) throw new Error(d.error);
      document.getElementById('email-subject').textContent = d.subject;
      document.getElementById('email-body').textContent = d.body;
      document.getElementById('email-box').classList.add('visible');
    } catch (err) {
      alert('Error: ' + err.message);
    }
    btn.disabled = false;
    btn.innerHTML = '✉️ Draft Outreach Email';
  }

  async function changeStage() {
    if (!currentLeadId) return;
    const stage = document.getElementById('stage-select').value;
    const r = await fetch(API + '/api/leads/' + currentLeadId, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ stage })
    });
    if (r.ok) alert('Stage updated to: ' + STAGE_LABELS[stage]);
  }

  function escHtml(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  loadPipeline();
</script>
</body>
</html>
